<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonneville Retreat – Host Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --forest-deep:#0d1410; --forest:#16201a; --panel:#1a2620; --panel2:#1e2c24;
    --border:#2a3a30; --copper:#b9824f; --copper-lt:#d49a64; --sage:#8fae9a; --sage-lt:#e8f0ea;
    --muted:#6b7d72; --green:#4caf7d; --red:#c0392b; --amber:#d4883a;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--forest-deep); color:var(--sage-lt); font-family:'Inter',sans-serif; font-weight:300; }

  #lock-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; }
  .lock-icon { font-size:2rem; margin-bottom:20px; }
  .lock-title { font-family:'Oswald',sans-serif; font-size:1.5rem; margin-bottom:6px; text-transform:uppercase; }
  .lock-sub { color:var(--muted); font-size:0.85rem; margin-bottom:28px; }
  .lock-input { width:100%; max-width:300px; padding:12px 16px; background:var(--panel); border:1px solid var(--border); color:var(--sage-lt); font-family:'Inter',sans-serif; font-size:1rem; border-radius:3px; text-align:center; letter-spacing:3px; margin-bottom:12px; }
  .lock-input:focus { outline:none; border-color:var(--copper); }
  .lock-btn { width:100%; max-width:300px; padding:12px; background:var(--copper); color:var(--forest-deep); font-family:'Inter',sans-serif; font-size:0.8rem; font-weight:500; letter-spacing:3px; text-transform:uppercase; border:none; border-radius:3px; cursor:pointer; }
  .lock-btn:hover { background:var(--copper-lt); }
  .lock-err { color:var(--red); font-size:0.8rem; margin-top:10px; display:none; }

  #report { display:none; }
  .topbar { background:var(--forest); border-bottom:1px solid var(--border); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .topbar-left { display:flex; align-items:center; gap:16px; }
  .topbar h1 { font-family:'Oswald',sans-serif; font-size:1.2rem; color:var(--copper); text-transform:uppercase; }
  .topbar-badge { font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; background:rgba(185,130,79,0.12); color:var(--copper); padding:4px 10px; border-radius:20px; border:1px solid rgba(185,130,79,0.25); }
  .topbar-actions { display:flex; gap:10px; }
  .btn-sm { padding:8px 14px; font-family:'Inter',sans-serif; font-size:0.75rem; letter-spacing:1.5px; text-transform:uppercase; border-radius:3px; cursor:pointer; font-weight:500; border:1px solid var(--border); background:var(--panel); color:var(--muted); transition:all 0.2s; }
  .btn-sm:hover { border-color:var(--copper); color:var(--copper); }
  .btn-sm.danger:hover { border-color:var(--red); color:var(--red); }

  .main-wrap { max-width:1100px; margin:0 auto; padding:32px 24px 80px; }

  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
  @media(max-width:700px){ .stats{ grid-template-columns:1fr 1fr; } }
  .stat { background:var(--panel); border:1px solid var(--border); border-radius:4px; padding:18px 20px; }
  .stat-label { font-size:0.62rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .stat-val { font-size:1.6rem; font-weight:600; color:var(--sage-lt); line-height:1; }
  .stat-val.copper { color:var(--copper); }
  .stat-sub { font-size:0.7rem; color:var(--muted); margin-top:5px; }

  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px; }
  @media(max-width:640px){ .two-col{ grid-template-columns:1fr; } }
  .card-box { background:var(--panel); border:1px solid var(--border); border-radius:4px; padding:20px 22px; }
  .card-box h3 { font-size:0.68rem; letter-spacing:3px; text-transform:uppercase; color:var(--copper); margin-bottom:16px; }

  .rank-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:0.85rem; }
  .rank-bar-wrap { flex:1; height:4px; background:var(--border); border-radius:2px; }
  .rank-bar { height:100%; background:var(--copper); border-radius:2px; }
  .rank-name { flex:0 0 auto; max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--sage-lt); }
  .rank-count { color:var(--muted); font-size:0.75rem; white-space:nowrap; }

  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.82rem; }
  th { background:var(--panel2); color:var(--muted); font-size:0.62rem; letter-spacing:2px; text-transform:uppercase; padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
  td { padding:11px 14px; border-bottom:1px solid var(--border); color:var(--sage-lt); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--panel2); }
  .td-muted { color:var(--muted); font-size:0.76rem; }
  .td-copper { color:var(--copper); font-weight:500; }

  .cost-table { background:var(--panel); border:1px solid var(--border); border-radius:4px; overflow:hidden; margin-bottom:28px; }
  .cost-row { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; border-bottom:1px solid var(--border); font-size:0.87rem; }
  .cost-row:last-child { border-bottom:none; }
  .cost-row.subtotal { background:var(--panel2); }
  .cost-row.total { background:#231a0e; border-top:1px solid rgba(185,130,79,0.3); font-size:1rem; font-weight:600; }
  .cost-row.total .cost-label { color:var(--copper); }
  .cost-row.total .cost-val { color:var(--copper); font-size:1.1rem; }
  .cost-label { color:var(--muted); }
  .cost-val { color:var(--sage-lt); font-weight:500; }

  .empty { text-align:center; padding:60px 20px; color:var(--muted); font-style:italic; }
  .rate-note { background:#1a1408; border:1px solid rgba(185,130,79,0.2); border-radius:4px; padding:14px 18px; font-size:0.8rem; color:var(--copper-lt); margin-bottom:24px; line-height:1.6; }
  .rate-note input { width:90px; padding:4px 8px; background:var(--forest-deep); border:1px solid var(--border); color:var(--sage-lt); border-radius:3px; font-family:'Inter',sans-serif; margin:0 4px; }

  @media print {
    #lock-screen { display:none !important; }
    #report { display:block !important; }
    .topbar-actions, .btn-sm { display:none; }
    body { background:white; color:black; }
  }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">Host Access</div>
  <div class="lock-sub">Enter the host password to view the reservation report.</div>
  <input type="password" class="lock-input" id="pwInput" placeholder="••••••" onkeydown="if(event.key==='Enter')unlock()" />
  <button class="lock-btn" onclick="unlock()">Enter</button>
  <div class="lock-err" id="lockErr">Incorrect password. Try again.</div>
</div>

<div id="report">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Bonneville Retreat · Host Report</h1>
      <span class="topbar-badge">Retirement Everest Series</span>
    </div>
    <div class="topbar-actions">
      <button class="btn-sm" onclick="window.print()">🖨 Print</button>
      <button class="btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn-sm danger" onclick="clearAll()">🗑 Clear Reservations</button>
    </div>
  </div>

  <div class="main-wrap">
    <div class="rate-note">
      💰 <strong>Room rate assumption:</strong> $<span id="rateDisplay">150</span>/night average (Bonneville rooms range ~$114–$202/night depending on type and season).
      <button class="btn-sm" style="margin-left:8px;" onclick="updateRate()">Adjust Rate</button>
    </div>
    <div id="report-body"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'bonneville_orders_v1';
const HOST_PASS = '1234';
let AVG_ROOM_RATE = 150;

const DINNER_PRICES = {
  d1:36.00, d2:45.00, d3:28.00, d4:23.00, d5:24.00, d6:14.00, d7:20.00
};

function unlock() {
  const pw = document.getElementById('pwInput').value;
  if (pw === HOST_PASS) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('report').style.display = 'block';
    renderReport();
  } else {
    document.getElementById('lockErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}

function getOrders() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
function fmt(n) { return '$' + n.toFixed(2); }

function updateRate() {
  const val = prompt('Enter average room rate per night ($):', AVG_ROOM_RATE);
  if (val && !isNaN(val)) {
    AVG_ROOM_RATE = parseFloat(val);
    document.getElementById('rateDisplay').textContent = AVG_ROOM_RATE.toFixed(0);
    renderReport();
  }
}

function renderReport() {
  const orders = getOrders();
  const body = document.getElementById('report-body');

  if (orders.length === 0) {
    body.innerHTML = '<div class="empty">No reservations submitted yet. Share the guest link to start collecting.</div>';
    return;
  }

  const enriched = orders.map(o => ({
    ...o,
    dinnerPrice: DINNER_PRICES[o.dinnerId] || 0,
    roomCost: AVG_ROOM_RATE // host pays full room rate per reservation regardless of occupancy
  }));

  const totalRoomCost = enriched.reduce((s,o) => s + o.roomCost, 0);
  const totalDinner = enriched.reduce((s,o) => s + o.dinnerPrice, 0);
  const grandTotal = totalRoomCost + totalDinner;
  const singleCount = enriched.filter(o => o.occupancy === 'single').length;
  const doubleCount = enriched.filter(o => o.occupancy === 'double').length;

  const roomCounts = {}, dinnerCounts = {}, starterCounts = {}, drinkCounts = {};
  let starterSkips = 0, drinkSkips = 0;
  enriched.forEach(o => {
    roomCounts[o.room] = (roomCounts[o.room] || 0) + 1;
    dinnerCounts[o.dinner] = (dinnerCounts[o.dinner] || 0) + 1;
    if (o.starter) starterCounts[o.starter] = (starterCounts[o.starter] || 0) + 1;
    else starterSkips++;
    if (o.drink) drinkCounts[o.drink] = (drinkCounts[o.drink] || 0) + 1;
    else drinkSkips++;
  });
  const topRooms = Object.entries(roomCounts).sort((a,b)=>b[1]-a[1]);
  const topDinners = Object.entries(dinnerCounts).sort((a,b)=>b[1]-a[1]);
  const topStarters = Object.entries(starterCounts).sort((a,b)=>b[1]-a[1]);
  const topDrinks = Object.entries(drinkCounts).sort((a,b)=>b[1]-a[1]);
  const maxR = topRooms[0]?.[1] || 1;
  const maxD = topDinners[0]?.[1] || 1;
  const maxSt = topStarters[0]?.[1] || 1;
  const maxDr = topDrinks[0]?.[1] || 1;

  body.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-label">Reservations</div><div class="stat-val">${enriched.length}</div></div>
      <div class="stat"><div class="stat-label">Single occupancy</div><div class="stat-val">${singleCount}</div></div>
      <div class="stat"><div class="stat-label">Double occupancy</div><div class="stat-val">${doubleCount}</div></div>
      <div class="stat"><div class="stat-label">Avg cost per reservation</div><div class="stat-val copper">${fmt(grandTotal/enriched.length)}</div></div>
    </div>

    <div class="two-col">
      <div class="card-box">
        <h3>Most selected rooms</h3>
        ${topRooms.map(([name,count]) => `
          <div class="rank-row">
            <div class="rank-name">${name}</div>
            <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(count/maxR)*100}%"></div></div>
            <div class="rank-count">${count}</div>
          </div>
        `).join('')}
      </div>
      <div class="card-box">
        <h3>Most selected dinners</h3>
        ${topDinners.map(([name,count]) => `
          <div class="rank-row">
            <div class="rank-name">${name}</div>
            <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(count/maxD)*100}%"></div></div>
            <div class="rank-count">${count}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="two-col">
      <div class="card-box">
        <h3>Pre-film starters</h3>
        ${topStarters.length ? topStarters.map(([name,count]) => `
          <div class="rank-row">
            <div class="rank-name">${name}</div>
            <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(count/maxSt)*100}%"></div></div>
            <div class="rank-count">${count}</div>
          </div>
        `).join('') : '<p style="color:var(--muted);font-size:0.8rem;">No starters selected yet.</p>'}
        ${starterSkips ? `<div class="rank-row" style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px;"><div class="rank-name" style="color:var(--muted);">Skipped</div><div class="rank-bar-wrap"></div><div class="rank-count">${starterSkips}</div></div>` : ''}
      </div>
      <div class="card-box">
        <h3>Pre-film drinks</h3>
        ${topDrinks.length ? topDrinks.map(([name,count]) => `
          <div class="rank-row">
            <div class="rank-name">${name}</div>
            <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(count/maxDr)*100}%"></div></div>
            <div class="rank-count">${count}</div>
          </div>
        `).join('') : '<p style="color:var(--muted);font-size:0.8rem;">No drinks selected yet.</p>'}
        ${drinkSkips ? `<div class="rank-row" style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px;"><div class="rank-name" style="color:var(--muted);">Skipped</div><div class="rank-bar-wrap"></div><div class="rank-count">${drinkSkips}</div></div>` : ''}
      </div>
    </div>

    <div class="card-box" style="margin-bottom:28px;">
      <h3>Cost estimate</h3>
      <div class="cost-table" style="margin-top:16px;">
        <div class="cost-row"><span class="cost-label">Rooms (${enriched.length} × $${AVG_ROOM_RATE.toFixed(0)}/night)</span><span class="cost-val">${fmt(totalRoomCost)}</span></div>
        <div class="cost-row"><span class="cost-label">Dinner subtotal</span><span class="cost-val">${fmt(totalDinner)}</span></div>
        <div class="cost-row subtotal"><span class="cost-label">Subtotal</span><span class="cost-val">${fmt(grandTotal)}</span></div>
        <div class="cost-row total"><span class="cost-label">Estimated total</span><span class="cost-val">${fmt(grandTotal)}</span></div>
      </div>
      <p style="font-size:0.75rem;color:var(--muted);margin-top:10px;">* Room rate is an estimate — adjust above to match your actual negotiated group rate. Pre-film starters/drinks are complimentary and not yet priced into this total — ask the resort for per-item bar/starter pricing if you want them factored in. Excludes WA sales tax, gratuity, and spa/activity add-ons.</p>
    </div>

    <div class="card-box">
      <h3>All reservations (${enriched.length})</h3>
      <div class="table-wrap" style="margin-top:16px;">
        <table>
          <thead><tr><th>#</th><th>Guest</th><th>Room</th><th>Occupancy</th><th>Starter</th><th>Drink</th><th>Dinner</th><th>Dinner Cost</th><th>Time</th></tr></thead>
          <tbody>
            ${enriched.map((o,i) => `
              <tr>
                <td class="td-muted">${i+1}</td>
                <td><strong>${o.name}</strong></td>
                <td>${o.room}</td>
                <td class="td-muted">${o.occupancy}</td>
                <td class="${o.starter ? '' : 'td-muted'}">${o.starter || '—'}</td>
                <td class="${o.drink ? '' : 'td-muted'}">${o.drink || '—'}</td>
                <td>${o.dinner}</td>
                <td class="td-copper">${fmt(o.dinnerPrice)}</td>
                <td class="td-muted">${new Date(o.ts).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function clearAll() {
  if (!confirm('Delete all reservations? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderReport();
}

function exportCSV() {
  const orders = getOrders();
  if (!orders.length) return alert('No reservations to export.');
  const enriched = orders.map(o => ({ ...o, dinnerPrice: DINNER_PRICES[o.dinnerId] || 0, roomCost: AVG_ROOM_RATE }));
  const rows = [
    ['#','Name','Room','Occupancy','Starter','Drink','Dinner','Dinner Price','Room Cost','Time'],
    ...enriched.map((o,i) => [i+1, o.name, o.room, o.occupancy, o.starter || '—', o.drink || '—', o.dinner, o.dinnerPrice.toFixed(2), o.roomCost.toFixed(2), new Date(o.ts).toLocaleString()])
  ];
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'bonneville_reservations.csv';
  a.click();
}
</script>
</body>
</html>
